name: Zesty Sync Preview

# On PRs into stage/production, run the sync analysis read-only and post (or
# update) a comment showing what the merge would change: added/updated for
# stage-targeted PRs, published for production-targeted PRs.
on:
  pull_request:
    branches: [stage, production]
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout (merge result)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Analyze sync impact (read-only)
        env:
          ZESTY_INSTANCE_ZUID: ${{ secrets.ZESTY_INSTANCE_ZUID }}
          ZESTY_DEVELOPER_TOKEN: ${{ secrets.ZESTY_DEVELOPER_TOKEN }}
          REPORT: 'true'
          BRANCH: ${{ github.event.pull_request.base.ref }}
          DIFF_BASE: ${{ github.event.pull_request.base.sha }}
          DIFF_HEAD: ${{ github.event.pull_request.head.sha }}
        run: node scripts/sync-to-zesty.js

      - name: Post / update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('zesty-report.md', 'utf8');
            } catch {
              body = 'zesty-sync: no report was generated.\n<!-- zesty-sync-report -->';
            }
            const marker = '<!-- zesty-sync-report -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
