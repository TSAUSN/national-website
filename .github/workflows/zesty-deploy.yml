name: Deploy to Zesty.io

on:
  push:
    branches: [stage, production]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Also publish to production (overrides branch logic)'
        required: false
        default: false
        type: boolean
      full_sync:
        description: 'Sync every mapped file instead of only changed files'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Needed so the job can commit new-resource ZUID mappings back to the branch.
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Zesty Sync & Deploy
        env:
          ZESTY_INSTANCE_ZUID: ${{ secrets.ZESTY_INSTANCE_ZUID }}
          ZESTY_DEVELOPER_TOKEN: ${{ secrets.ZESTY_DEVELOPER_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          MANUAL_PUBLISH: ${{ inputs.publish }}
          FULL_SYNC: ${{ inputs.full_sync }}
          DIFF_BASE: ${{ github.event.before }}
        run: node scripts/sync-to-zesty.js

      - name: Commit new-resource ZUID mappings
        run: |
          if ! git diff --quiet -- zesty.config.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add zesty.config.json
            git commit -m "chore: map new Zesty resource ZUIDs [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
